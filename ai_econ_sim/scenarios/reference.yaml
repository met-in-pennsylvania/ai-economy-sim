scenario_name: "fragmented_capable_unreliable"
horizon_quarters: 40
seed: 42

# v0 reference: capability grows (especially routine tasks) but reliability floors
# stay high for judgment/interpersonal tasks. OSS gap is small — AI capability is
# diffuse. Deployment lags capability because reliability thresholds gate it.

